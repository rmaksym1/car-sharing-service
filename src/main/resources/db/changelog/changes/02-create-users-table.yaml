databaseChangeLog:
  - changeSet:
      id: create-users-table
      author: rmaksym1
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: is_deleted
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
        - insert:
            tableName: users
            columns:
              - column: { name: email, value: "admin@gmail.com" }
              - column: { name: password, value: "$2a$08$qD8JtGiJUwPMJrH8S8M9zuR.ooUKJX2LrM8.DIQZ1Z1XhVIO5x/pK" }
              - column: { name: first_name, value: "admin" }
              - column: { name: last_name, value: "admin" }
              - column: { name: role, value: "ADMIN" }